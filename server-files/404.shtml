<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — ALX Ghana Community</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .code {
      font-size: 5rem;
      font-weight: 800;
      color: #0452F0;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #1e293b;
    }

    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: #0452F0;
      color: #fff;
      text-decoration: none;
      padding: 0.65rem 1.5rem;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.15s;
    }

    .btn:hover { background: #0341c0; }

    .divider {
      margin: 1.5rem 0;
      border: none;
      border-top: 1px solid #e2e8f0;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      color: #0452F0;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>
      The page you're looking for doesn't exist or may have been moved.
      Check the URL or head back to the homepage.
    </p>
    <a href="https://alxghanacommunity.com" class="btn">Go to Homepage</a>

    <hr class="divider" />

    <div class="links">
      <a href="https://learnsync.alxghanacommunity.com">LearnSync Platform</a>
      <a href="mailto:info@alxghanacommunity.com">Contact Us</a>
    </div>
  </div>
</body>
</html>
