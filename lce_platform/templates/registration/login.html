<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — LearnSync</title>

  <!-- Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Centered panel ── */
    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    /* Brand bar */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .login-brand-icon {
      width: 36px; height: 36px;
      background: #0452F0;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .login-brand-icon span {
      color: #fff; font-weight: 800; font-size: 16px;
    }
    .login-brand-name {
      font-size: 20px; font-weight: 700; color: #111827; letter-spacing: -.02em;
    }

    /* Card */
    .login-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .login-card h1 {
      font-size: 18px; font-weight: 700; color: #111827;
      margin-bottom: 4px;
    }
    .login-card .login-sub {
      font-size: 13px; color: #9ca3af; margin-bottom: 28px;
    }

    /* Form elements */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600; color: #374151;
      margin-bottom: 6px;
    }
    .form-input-wrap {
      position: relative;
    }
    .form-input-wrap .input-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      font-size: 15px; color: #9ca3af; pointer-events: none;
    }
    .form-control {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      color: #111827;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .form-control:focus {
      border-color: #0452F0;
      box-shadow: 0 0 0 3px rgba(4,82,240,.12);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 15px; color: #9ca3af; padding: 2px;
      line-height: 1;
    }
    .pw-toggle:hover { color: #374151; }

    /* Error alert */
    .login-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 12px;
      color: #dc2626;
      margin-bottom: 20px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .login-error i { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

    /* Submit button */
    .btn-signin {
      width: 100%;
      padding: 10px 16px;
      background: #0452F0;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s, transform .08s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-signin:hover  { background: #0341c0; }
    .btn-signin:active { transform: scale(.98); }

    /* Footer note */
    .login-footer {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Brand -->
  <div class="login-brand">
    <div class="login-brand-icon"><span>A</span></div>
    <span class="login-brand-name">LearnSync</span>
  </div>

  <!-- Card -->
  <div class="login-card">
    <h1>Welcome back</h1>
    <p class="login-sub">Sign in to your account to continue</p>

    {% if form.errors %}
    <div class="login-error">
      <i class="ti ti-alert-circle"></i>
      <span>Invalid username or password. Please try again.</span>
    </div>
    {% endif %}

    <form method="post" autocomplete="on">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_username">Username</label>
        <div class="form-input-wrap">
          <i class="ti ti-user input-icon"></i>
          <input type="text" name="username" id="id_username"
                 class="form-control" autocomplete="username"
                 autofocus required placeholder="Your username">
        </div>
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <div class="form-input-wrap">
          <i class="ti ti-lock input-icon"></i>
          <input type="password" name="password" id="id_password"
                 class="form-control" autocomplete="current-password"
                 required placeholder="••••••••">
          <button type="button" class="pw-toggle" onclick="togglePw(this)" aria-label="Show/hide password">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-signin">
        <i class="ti ti-login"></i>
        Sign in
      </button>
    </form>
  </div>

  <div class="login-footer">
    LearnSync — Learner Success Platform &nbsp;·&nbsp; Internal use only
  </div>

</div>

<script>
function togglePw(btn) {
  var input = btn.closest('.form-input-wrap').querySelector('input');
  var icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    input.type = 'password';
    icon.className = 'ti ti-eye';
  }
}
</script>

</body>
</html>
