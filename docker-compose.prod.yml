services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: lce_platform/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"

  worker:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: lce_platform/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    command: python manage.py qcluster

volumes:
  pgdata:
